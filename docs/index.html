<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rabbit Counter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: linear-gradient(135deg, #B5E050 0%, #4ECDC4 50%, #4A90D9 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      margin-bottom: 20px;
      box-shadow: 0 8px 24px rgba(78,205,196,0.35);
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #1d1d1f;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #6e6e73;
    }

    .cards {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 600px;
      width: 100%;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px 32px;
      flex: 1;
      min-width: 220px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0,0,0,0.11);
    }

    .card-icon {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .card h2 {
      font-size: 17px;
      font-weight: 600;
      color: #1d1d1f;
      margin-bottom: 6px;
    }

    .card p {
      font-size: 13px;
      color: #6e6e73;
      line-height: 1.5;
    }

    .arrow {
      display: inline-block;
      color: #4ECDC4;
      font-size: 13px;
      margin-top: 10px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="logo">🐇</div>
    <h1>Rabbit Counter</h1>
    <p class="subtitle">Track your evening rabbit sightings</p>
  </div>

  <div class="cards">
    <a class="card" href="privacy-policy.html">
      <div class="card-icon">🔒</div>
      <h2>Privacy Policy</h2>
      <p>How we collect, use, and protect your information.</p>
      <div class="arrow">Read →</div>
    </a>
    <a class="card" href="terms.html">
      <div class="card-icon">📄</div>
      <h2>Terms &amp; Conditions</h2>
      <p>The terms governing your use of the app.</p>
      <div class="arrow">Read →</div>
    </a>
  </div>
</body>
</html>
